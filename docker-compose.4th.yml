services:
  # nginx가 frontend/ 를 멀티스테이지로 빌드해 서빙하므로, 배포 워크플로우(.github/workflows/deploy-4th.yml)도
  # frontend/** 변경을 감시하도록 되어 있다.
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
      - fastapi
    volumes:
      - static_volume:/static
      - /etc/letsencrypt:/etc/letsencrypt:ro

  django:
    build:
      context: ./webapp
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_volume:/app/static
    expose:
      - "8000"

  # 관리자 대시보드의 '오늘' 통계·주간 추이는 DailyMetric 캐시를 읽는데, 이를 채우는
  # aggregate_daily_stats가 그동안 어디서도 스케줄링되지 않아 값이 항상 0이었다.
  # django와 같은 이미지를 재사용해 하루 1회(+ 기동 시 즉시 1회) 배치를 돌린다.
  cron:
    build:
      context: ./webapp
    restart: unless-stopped
    env_file: .env
    depends_on:
      - django
    entrypoint: ["sh", "-c"]
    command: ["while true; do python manage.py aggregate_daily_stats; sleep 86400; done"]

  fastapi:
    build:
      context: .
      dockerfile: deploy/Dockerfile.fastapi
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "8001"

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512M
    volumes:
      - neo4j_data:/data
    expose:
      - "7474"
      - "7687"

volumes:
  static_volume:
  neo4j_data:
