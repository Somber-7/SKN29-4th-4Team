limit_req_zone $binary_remote_addr zone=naming:10m rate=5r/m;

server {
    listen 80;
    server_name myeongga.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name myeongga.site;

    ssl_certificate /etc/letsencrypt/live/myeongga.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myeongga.site/privkey.pem;

    # React SPA (빌드 산출물)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Django (인증·마이페이지·이력)
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
    }

    # FastAPI (작명 생성 · LLM)
    location /naming-api/ {
        proxy_pass http://fastapi:8001/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        limit_req zone=naming burst=5;
    }

    # Django collectstatic (admin 정적 파일)
    location /static/ {
        alias /static/;
    }
}
