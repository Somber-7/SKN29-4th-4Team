limit_req_zone $binary_remote_addr zone=naming:10m rate=5r/m;
# 관리자 로그인 IP 레이트리밋 — 계정 잠금(5회/10분)과 별개로 무차별 대입을 완화한다(§15.4).
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;

server {
    listen 80;
    server_name myeongga.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name myeongga.site;

    ssl_certificate /etc/letsencrypt/live/myeongga.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myeongga.site/privkey.pem;

    # 관리자 정적 자산 — SPA 폴백보다 먼저 매칭되어야 한다(§16.3, R6)
    location /manage/assets/ {
        alias /usr/share/nginx/html/manage/assets/;
        access_log off;
        expires 1y;
    }

    # 슬래시 없는 /manage 요청은 prefix 매칭(/manage/)에 안 걸려 아래 React SPA로
    # 새어나간다 — 표준 트레일링 슬래시 리다이렉트로 먼저 잡는다.
    location = /manage {
        return 301 /manage/;
    }

    # 관리자 SPA 진입/딥링크 폴백
    # TODO: IP 화이트리스트/basic-auth 1차 관문 추가(§2) — 실제 접근 제한은
    # /api/admin/*의 서버 RBAC(AdminAuth·require_role)가 담당하므로 이건 보조 계층이다.
    location /manage/ {
        root /usr/share/nginx/html;
        try_files $uri /manage/admin.html;
    }

    # React SPA (빌드 산출물)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # 관리자 로그인만 별도 레이트리밋(§15.4) — 나머지 /api/admin/*는 아래 /api/ 프록시를 그대로 탄다
    location = /api/admin/login {
        limit_req zone=admin_login burst=5 nodelay;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django (인증·마이페이지·이력·관리자 API)
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
    }

    # FastAPI (작명 생성 · LLM)
    location /naming-api/ {
        proxy_pass http://fastapi:8001/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        limit_req zone=naming burst=5;
    }

    # Django collectstatic (admin 정적 파일)
    location /static/ {
        alias /static/;
    }
}
