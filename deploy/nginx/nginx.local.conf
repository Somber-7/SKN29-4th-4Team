limit_req_zone $binary_remote_addr zone=naming:10m rate=5r/m;
# 관리자 로그인 IP 레이트리밋 — 계정 잠금(5회/10분)과 별개로 무차별 대입을 완화한다(§15.4).
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;

server {
    listen 80;

    # 관리자 정적 자산 — SPA 폴백보다 먼저 매칭되어야 한다(§16.3, R6)
    location /manage/assets/ {
        alias /usr/share/nginx/html/manage/assets/;
        access_log off;
        expires 1y;
    }

    # 관리자 SPA 진입/딥링크 폴백
    location /manage/ {
        root /usr/share/nginx/html;
        try_files $uri /manage/admin.html;
    }

    # React SPA (빌드 산출물)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # 관리자 로그인만 별도 레이트리밋(§15.4) — 나머지 /api/admin/*는 아래 /api/ 프록시를 그대로 탄다
    location = /api/admin/login {
        limit_req zone=admin_login burst=5 nodelay;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django (인증·마이페이지·이력·관리자 API)
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
    }

    # FastAPI (작명 생성 · LLM)
    location /naming-api/ {
        proxy_pass http://fastapi:8001/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        limit_req zone=naming burst=5;
    }

    # Django collectstatic (admin 정적 파일)
    location /static/ {
        alias /static/;
    }
}
